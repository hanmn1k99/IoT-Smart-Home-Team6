version: '3.8'

services:
  ai-service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: iot-ai-service
    restart: unless-stopped
    # Tự động nạp các biến từ file .env vào trong container
    env_file:
      - .env
    # Cấu hình múi giờ hệ thống (tùy chọn nhưng tốt cho Node.js)
    environment:
      - TZ=Asia/Ho_Chi_Minh
